<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Логин</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-container">

    <header class="header">
        <h1>Логин</h1>
        <p class="credentials-hint">username / password</p>
    </header>


    <div th:if="${param.verified}">
        Email успешно подтвержден
    </div>

    <div th:if="${param.emailSent}">
        Письмо с подтверждением отправлено
    </div>


    <form class="login-card" th:action="@{/auth/login}" method="post">

        <div class="input-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required>
        </div>

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <button type="submit" class="login-button">
            Войти
        </button>

    </form>


    <div th:if="${verifyEmail}">

        <form th:action="@{/auth/send-email}" method="post">

            <input type="hidden"
                   name="email"
                   th:value="${verifyEmail}" />

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}" />

            <button type="submit" class="login-button">
                Отправить подтверждение email
            </button>

        </form>

    </div>

</div>
</body>

</html>
