<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/onboarding :: layout(~{::content}, 'Current Feel', 'current-feel.css')}">

<th:block th:fragment="content">
    <div class="step-content">
        <h1>Right now, your space usually feels...</h1>
        <p>Pick what customers experience before music is added</p>

        <form th:action="@{/onboarding/step-3}" method="post">
            <div class="chips">
                <label th:each="feel : ${currentFeels}" class="chip">
                    <input type="checkbox" name="currentFeels" th:value="${feel}">
                    <span th:text="${feel.name}">Busy & Fast-moving</span>
                </label>
            </div>

            <hr>
            <button class="btn-primary" type="submit">Continue</button>
        </form>
    </div>
</th:block>
</html>
