<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
                    ~{::content},
                    'Dashboard - GenVibe',
                    'dashboard.css',
                    'Company Dashboard'
                    )}">

<th:block th:fragment="content">
    <p class="subtitle">Manage your AI music and control which stores are live.</p>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-header">
                <div class="card-icon" th:replace="~{fragments/icons :: icon-music}"></div>
                <span class="card-status" th:text="${musicType != null} ? 'Selected' : 'Not selected'">Not selected</span>
            </div>
            <div class="card-body">
                <h3>Music Management</h3>
                <p>Choose the music style for your brand</p>
                <a th:href="@{/music}" class="btn-action primary">Select music type</a>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-icon" th:replace="~{fragments/icons :: icon-store}"></div>
                <span class="card-status" th:text="${#lists.size(stores)} + ' stores'">0 stores</span>
            </div>
            <div class="card-body">
                <h3>Stores</h3>
                <p>Add and manage your store locations</p>
                <a th:href="@{/stores}" class="btn-action secondary" th:disabled="${musicType == null}">Add store</a>
            </div>
        </div>
    </div>
</th:block>
</html>
