<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
                    ~{::content},
                    'Music - GenVibe',
                    'music.css',
                    'Select music type',
                    'music'
                    )}">

<th:block th:fragment="content">
    <p class="subtitle">Choose a music style that matches your brand atmosphere.</p>

    <div class="music-type-list">
        <div th:each="type : ${musicTypes}"
             class="music-card"
             th:data-id="${type.id}"
             th:data-name="${type.name}">
            <img th:src="@{'/assets/music/' + ${type.iconName}}"
                 class="music-icon-img"
                 alt="Music Icon">

            <div class="music-info">
                <h3 th:text="${type.name}">Style Name</h3>
                <p th:text="${type.description}">Style description text goes here.</p>
            </div>

            <div class="waveform">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <button class="btn-play"
                    th:data-url="${type.previewUrl}"
                    onclick="playPreview(this.getAttribute('data-url'))">
                <span class="play-icon">▶</span> Play preview
            </button>
        </div>
    </div>

    <div class="action-footer">
        <div class="footer-buttons">
            <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>

            <form th:action="@{/api/music}" method="post" id="musicForm">
                <div id="selectedInputsContainer"></div>
                <button type="submit" class="btn-save" id="saveButton" disabled>Select and save</button>
            </form>
        </div>
        <p class="footer-note">This style will be used as the default for all active stores</p>
    </div>

    <script>
        const selectedStyles = new Set();

        document.querySelectorAll('.music-card').forEach(card => {
            card.addEventListener('click', () => {
                const musicName = card.getAttribute('data-name');

                if (selectedStyles.has(musicName)) {
                    selectedStyles.delete(musicName);
                    card.classList.remove('selected');
                } else {
                    selectedStyles.add(musicName);
                    card.classList.add('selected');
                }

                const container = document.getElementById('selectedInputsContainer');
                container.innerHTML = '';

                selectedStyles.forEach(name => {
                    const input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'musicTypes';
                    input.value = name;
                    container.appendChild(input);
                });

                const saveBtn = document.getElementById('saveButton');
                saveBtn.disabled = selectedStyles.size === 0;

                console.log("Current selection:", Array.from(selectedStyles));
            });
        });

        function playPreview(url) {
            if (event) event.stopPropagation();
            console.log("Playing: " + url);
        }
    </script>
</th:block>
</html>
