<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(
                    ~{::content},
                    'Music - GenVibe',
                    'music.css',
                    'Select music type',
                    'music'
                    )}">

<th:block th:fragment="content">
<!--    <p class="subtitle">Choose a music style that matches your brand atmosphere.</p>-->

    <div th:if="${activePage == 'music'}" class="music-type-list">
        <div class="atmosphere-cards">
            <div class="music-subtitle">
                <h3>Atmosphere</h3>
                <p>Select the AI-generated atmosphere for all your stores. You can update this anytime.</p>
            </div>
            <div class="chips">
                <label th:each="type : ${musicTypes}" class="chip">
                    <input type="radio" name="musicTypes" th:value="${type}">
                    <span th:text="${type.name}">Music Type</span>
                </label>
            </div>
        </div>
        <div class="atmosphere-cards">
            <div class="music-subtitle">
                <h3>Mood</h3>
                <p>Select the AI-generated mood for all your stores. You can update this anytime.</p>
            </div>
            <div class="chips">
                <label th:each="type : ${spacePurposes}" class="chip">
                    <input type="radio" name="spacePurposes" th:value="${type}">
                    <span th:text="${type.name}">Music Type</span>
                </label>
            </div>
        </div>

        <div th:each="type : ${musicTypes}"
             class="music-card"
             th:data-id="${type.id}"
             th:data-name="${type.name}">
            <img th:src="@{'/assets/music/' + ${type.iconName}}"
                 class="music-icon-img"
                 alt="Music Icon">

            <div class="music-info">
                <h3 th:text="${type.name}">Style Name</h3>
                <p th:text="${type.description}">Style description text goes here.</p>
            </div>

            <div class="waveform-placeholder">
                <canvas class="waveCanvas"></canvas>
            </div>

<!--            <button class="play-btn"-->
<!--                    th:data-src="${music.fileUrl}"-->
<!--                    onclick="toggleAudio(this)">-->
<!--                <span class="icon" th:replace="~{fragments/icons :: icon-start}"></span>-->
<!--                <span class="icon" th:replace="~{fragments/icons :: icon-pause}"></span>-->
<!--            </button>-->
        </div>
    </div>

    <div class="action-footer">
        <div class="footer-buttons">
            <a th:href="@{/dashboard}" class="btn-cancel">Cancel</a>

            <form th:action="@{/api/music}" method="post" id="musicForm">
                <div id="selectedInputsContainer"></div>
                <button type="submit" class="btn-save" id="saveButton" disabled>Select and save</button>
            </form>
        </div>
        <p class="footer-note">This style will be used as the default for all active stores</p>
    </div>
