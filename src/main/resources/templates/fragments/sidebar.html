<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar">
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>Resona AI</h2>
            <p>Admin Panel</p>
            <hr>
        </div>
        <div class="sidebar-menu">
            <a th:href="@{/dashboard}" class="menu-item">
                <span class="icon" th:replace="~{fragments/icons :: icon-dashboard}"></span>
                Dashboard
            </a>
            <a th:href="@{/music}" class="menu-item">
                <span class="icon" th:replace="~{fragments/icons :: icon-music}"></span>
                Music Library
            </a>
            <a th:href="@{/stores}" class="menu-item">
                <span class="icon" th:replace="~{fragments/icons :: icon-store}"></span>
                Stores
            </a>
            <a th:href="@{/jingles}" class="menu-item">
                <span class="icon" th:replace="~{fragments/icons :: icon-jingle}"></span>
                Jingles
            </a>
            <a th:href="@{/analytics}" class="menu-item">
                <span class="icon" th:replace="~{fragments/icons :: icon-analytics}"></span>
                Analytics
            </a>
            <a th:href="@{/settings}" class="menu-item">
                <span class="icon" th:replace="~{fragments/icons :: icon-settings}"></span>
                Settings
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="footer-action">
                <a th:href="@{/library}" class="btn-black">
                    <span class="icon" th:replace="~{fragments/icons :: icon-help}"></span> Help Center
                </a>
            </div>

            <hr class="divider">

            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name">User Name</span>
                    <span class="user-role">Admin</span>
                </div>
            </div>
        </div>
    </nav>
</div>

</body>
</html>
