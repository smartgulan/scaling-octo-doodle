<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, pageTitle, pageCss, mainTitle)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">GenVibe</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{'/css/' + ${pageCss}}">
    <script th:src="@{/js/main.js}"></script>
</head>

<body>
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

<main class="main-container">
    <header class="header-panel">
        <h1 class="main-title" th:text="${mainTitle}">Page Title</h1>

        <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="logout-link">Log Out</button>
        </form>
    </header>

    <div class="content-wrapper">
        <th:block th:insert="${content}"></th:block>
    </div>
</main>
</body>
</html>
