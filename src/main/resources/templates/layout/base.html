<!DOCTYPE html>
<html lang="ru"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, pageTitle, pageCss, mainTitle, activePage)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <title th:text="${pageTitle}">GenVibe</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{'/css/' + ${pageCss}}">
    <script th:src="@{/js/main.js}"></script>
</head>

<body>

<!-- Sidebar -->
<aside th:replace="~{fragments/sidebar :: sidebar(activePage=${activePage})}"></aside>

<!-- Main -->
<main class="main-container">
    <header class="header-panel">

        <div class="header-left">
            <a th:if="${activePage == 'stores' or activePage == 'music'}"
               class="back-icon"
               onclick="if (history.length > 1) { history.back(); } else { window.location.href='/dashboard'; }">
                <span th:replace="~{fragments/icons :: icon-back}"></span>
            </a>

            <h1 th:text="${mainTitle}">Page Title</h1>
        </div>

        <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="logout-link">Log Out</button>
        </form>

    </header>

    <div class="content-wrapper">
        <th:block th:insert="${content}"></th:block>
    </div>
</main>

</body>
</html>
